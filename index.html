<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text editor</title>
   <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">

  <!-- Brand -->
  <div id="brand">
    <div class="logo">Text<span>.</span>Editor</div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">

    <!-- History -->
    <div class="tb-group">
      <button class="tb-btn" data-tip="Undo (Ctrl+Z)" onclick="document.execCommand('undo')">
        <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05 1-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
      </button>
      <button class="tb-btn" data-tip="Redo (Ctrl+Y)" onclick="document.execCommand('redo')">
        <svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 9 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
      </button>
    </div>

    <!-- Style -->
    <div class="tb-group">
      <div class="select-wrap">
        <select class="tb-select" id="heading-select" onchange="applyHeading(this.value)" data-tip="Heading">
          <option value="p">Paragraph</option>
          <option value="h1">Heading 1</option>
          <option value="h2">Heading 2</option>
          <option value="h3">Heading 3</option>
          <option value="pre">Code Block</option>
        </select>
      </div>
    </div>

    <!-- Font size -->
    <div class="tb-group">
      <div class="select-wrap">
        <select class="tb-select" id="size-select" onchange="applyFontSize(this.value)">
          <option value="3" selected>Normal</option>
          <option value="2">Small</option>
          <option value="4">Large</option>
          <option value="5">X-Large</option>
          <option value="6">2X</option>
        </select>
      </div>
    </div>

    <!-- Text formatting -->
    <div class="tb-group">
      <button class="tb-btn" id="btn-bold"   data-tip="Bold (Ctrl+B)"      onclick="fmt('bold')">
        <svg viewBox="0 0 24 24"><path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/></svg>
      </button>
      <button class="tb-btn" id="btn-italic" data-tip="Italic (Ctrl+I)"    onclick="fmt('italic')">
        <svg viewBox="0 0 24 24"><path d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/></svg>
      </button>
      <button class="tb-btn" id="btn-underline" data-tip="Underline (Ctrl+U)" onclick="fmt('underline')">
        <svg viewBox="0 0 24 24"><path d="M12 17c3.31 0 6-2.69 6-6V3h-2.5v8c0 1.93-1.57 3.5-3.5 3.5S8.5 12.93 8.5 11V3H6v8c0 3.31 2.69 6 6 6zm-7 2v2h14v-2H5z"/></svg>
      </button>
      <button class="tb-btn" id="btn-strikethrough" data-tip="Strikethrough" onclick="fmt('strikeThrough')">
        <svg viewBox="0 0 24 24"><path d="M10 19h4v-3h-4v3zM5 4v3h6v3h2V7h6V4H5zM3 14h18v-2H3v2z"/></svg>
      </button>
    </div>

    <!-- Alignment -->
    <div class="tb-group">
      <button class="tb-btn" data-tip="Align Left"    onclick="fmt('justifyLeft')">
        <svg viewBox="0 0 24 24"><path d="M15 15H3v2h12v-2zm0-8H3v2h12V7zM3 13h18v-2H3v2zm0 8h18v-2H3v2zM3 3v2h18V3H3z"/></svg>
      </button>
      <button class="tb-btn" data-tip="Center"        onclick="fmt('justifyCenter')">
        <svg viewBox="0 0 24 24"><path d="M7 15v2h10v-2H7zm-4 6h18v-2H3v2zm0-8h18v-2H3v2zm4-6v2h10V7H7zM3 3v2h18V3H3z"/></svg>
      </button>
      <button class="tb-btn" data-tip="Align Right"   onclick="fmt('justifyRight')">
        <svg viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zm6-4h12v-2H9v2zm-6-4h18v-2H3v2zm6-4h12V7H9v2zM3 3v2h18V3H3z"/></svg>
      </button>
      <button class="tb-btn" data-tip="Justify"       onclick="fmt('justifyFull')">
        <svg viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18V7H3v2zm0-6v2h18V3H3z"/></svg>
      </button>
    </div>

    <!-- Lists -->
    <div class="tb-group">
      <button class="tb-btn" data-tip="Bullet List"   onclick="fmt('insertUnorderedList')">
        <svg viewBox="0 0 24 24"><path d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zM7 19h14v-2H7v2zm0-6h14v-2H7v2zm0-8v2h14V5H7z"/></svg>
      </button>
      <button class="tb-btn" data-tip="Numbered List" onclick="fmt('insertOrderedList')">
        <svg viewBox="0 0 24 24"><path d="M2 17h2v.5H3v1h1v.5H2v1h3v-4H2v1zm1-9h1V4H2v1h1v3zm-1 3h1.8L2 13.1v.9h3v-1H3.2L5 10.9V10H2v1zm5-6v2h14V5H7zm0 14h14v-2H7v2zm0-6h14v-2H7v2z"/></svg>
      </button>
      <button class="tb-btn" data-tip="Indent"        onclick="fmt('indent')">
        <svg viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zM3 8v8l4-4-4-4zm8 9h10v-2H11v2zM3 3v2h18V3H3zm8 6h10V7H11v2zm0 4h10v-2H11v2z"/></svg>
      </button>
      <button class="tb-btn" data-tip="Outdent"       onclick="fmt('outdent')">
        <svg viewBox="0 0 24 24"><path d="M11 17h10v-2H11v2zM3 12l4 4V8l-4 4zm0 9h18v-2H3v2zM3 3v2h18V3H3zm8 6h10V7H11v2zm0 4h10v-2H11v2z"/></svg>
      </button>
    </div>

    <!-- Extras -->
    <div class="tb-group">
      <button class="tb-btn" data-tip="Blockquote"    onclick="wrapBlockquote()">
        <svg viewBox="0 0 24 24"><path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/></svg>
      </button>
      <button class="tb-btn" data-tip="Highlight"     onclick="fmt('hiliteColor','#fce06c')">
        <svg viewBox="0 0 24 24"><path d="M7 18l2.5 2.5L12 18l2.5 2.5 2-2-2-2H6l2 2zm9.5-10.5L12 3 7.5 7.5 12 12l4.5-4.5zM4 16l1.5 1.5 2-2L6 14l-2 2zm15.5-1L18 13.5l-1.5 1.5 1.5 1.5L19.5 15z"/></svg>
      </button>
      <button class="tb-btn" data-tip="Clear Format"  onclick="fmt('removeFormat')">
        <svg viewBox="0 0 24 24"><path d="M3.27 5L2 6.27l6.97 6.97L6.5 19h3l1.57-3.97L17.73 21 19 19.73 3.27 5zM6 5v.18L8.82 8h2.4l-.72 1.68 2.1 2.1L14.21 8H20V5H6z"/></svg>
      </button>
      <button class="tb-btn" data-tip="Horizontal Rule" onclick="insertHR()">
        <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
      </button>
      <button class="tb-btn" data-tip="Insert Table"  onclick="insertTable()">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM8 20H4v-4h4v4zm0-6H4v-4h4v4zm0-6H4V4h4v4zm6 12h-4v-4h4v4zm0-6h-4v-4h4v4zm0-6h-4V4h4v4zm6 12h-4v-4h4v4zm0-6h-4v-4h4v4zm0-6h-4V4h4v4z"/></svg>
      </button>
      <button class="tb-btn" data-tip="Insert Image"  onclick="openImgBar(event)" id="btn-img">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      </button>
      <button class="tb-btn" data-tip="Insert Link"   onclick="openLinkModal()">
        <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
      </button>
    </div>

    <!-- Color -->
    <div class="tb-group">
      <label class="tb-btn" data-tip="Text Color" style="width:auto;padding:0 6px;gap:5px;font-size:11px;color:var(--ink-faint);">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M2 20h20v4H2v-4zm3.49-3h2.42l1.27-3.58h5.65L16.09 17h2.42L13 3h-2L5.49 17zm4.42-5.61l2.03-5.98h.12l2.03 5.98H9.91z"/></svg>
        <input type="color" value="#1a1a18" onchange="fmt('foreColor',this.value)" title="">
      </label>
      <label class="tb-btn" data-tip="BG Color" style="width:auto;padding:0 6px;gap:5px;font-size:11px;color:var(--ink-faint);">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M16.56 8.94L7.62 0 6.21 1.41l2.38 2.38-5.15 5.15c-.59.56-.59 1.53 0 2.12l5.5 5.5c.29.29.68.44 1.06.44s.77-.15 1.06-.44l5.5-5.5c.59-.58.59-1.56 0-2.12zM5.21 10L10 5.21 14.79 10H5.21zM19 11.5s-2 2.17-2 3.5c0 1.1.9 2 2 2s2-.9 2-2c0-1.33-2-3.5-2-3.5z"/></svg>
        <input type="color" value="#fce06c" onchange="fmt('hiliteColor',this.value)" title="">
      </label>
    </div>

    <!-- Print / Export -->
    <div class="tb-group">
      <button class="tb-btn" data-tip="Print" onclick="window.print()">
        <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
      </button>
    </div>

  </div>

  <!-- Sidebar -->
  <aside id="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-label">Document</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" id="st-words">0</div><div class="stat-key">Words</div></div>
        <div class="stat-box"><div class="stat-val" id="st-chars">0</div><div class="stat-key">Chars</div></div>
        <div class="stat-box"><div class="stat-val" id="st-paras">0</div><div class="stat-key">Paras</div></div>
        <div class="stat-box"><div class="stat-val" id="st-read">0m</div><div class="stat-key">Read time</div></div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Quick Styles</div>
      <button class="fmt-btn" onclick="applyHeadingAndFocus('h1')"><span class="fmt-label" style="font-family:'Playfair Display',serif;font-size:1rem;">Heading 1</span><span class="fmt-hint">H1</span></button>
      <button class="fmt-btn" onclick="applyHeadingAndFocus('h2')"><span class="fmt-label" style="font-family:'Playfair Display',serif;">Heading 2</span><span class="fmt-hint">H2</span></button>
      <button class="fmt-btn" onclick="applyHeadingAndFocus('h3')"><span class="fmt-label" style="text-transform:uppercase;font-size:10px;letter-spacing:.1em;">Heading 3</span><span class="fmt-hint">H3</span></button>
      <button class="fmt-btn" onclick="wrapBlockquote()"><span class="fmt-label" style="font-style:italic;">" Blockquote</span></button>
      <button class="fmt-btn" onclick="insertHR()"><span class="fmt-label">— Divider</span></button>
      <button class="fmt-btn" onclick="insertTable()"><span class="fmt-label">⊞ Table 3×3</span></button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Find & Replace</div>
      <input class="fr-input" id="fr-find" placeholder="Find…" oninput="highlightFind()">
      <input class="fr-input" id="fr-replace" placeholder="Replace with…">
      <div class="fr-actions">
        <button class="fr-btn" onclick="findNext()">Next</button>
        <button class="fr-btn primary" onclick="replaceAll()">Replace All</button>
      </div>
      <div id="fr-status"></div>
    </div>

  </aside>

  <!-- Canvas / Page -->
  <main id="canvas">
    <div class="page-meta">
      <input class="page-title-input" id="doc-title" placeholder="Untitled Document…">
      <span class="page-date" id="today-date"></span>
    </div>

    <div id="paper">
      <div id="editor"
           contenteditable="true"
           spellcheck="true"
           data-placeholder="Begin writing your story…"
      ></div>
    </div>

    <div id="statusbar">
      <span id="sb-saved">● Saved</span>
      <span id="sb-sel"></span>
    </div>
  </main>

</div>

<!-- Link modal -->
<div id="link-modal-overlay" onclick="closeLinkModal(event)">
  <div id="link-modal">
    <h3>Insert Link</h3>
    <input id="link-url" type="url" placeholder="https://example.com">
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeLinkModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="confirmLink()">Insert</button>
    </div>
  </div>
</div>

<!-- Image URL bar -->
<div id="img-url-bar">
  <input id="img-url-input" type="url" placeholder="Paste image URL…">
  <button onclick="insertImage()">Insert</button>
</div>

    <script type="module" src="script.js"></script>
</body>
</html>
